name: pronotes_latex
description: Brutalist Hybrid LaTeX and Visual PDF Editor.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '^3.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  flutter_markdown: ^0.7.4     # Updated for Dart 3
  markdown: ^7.3.1             # Updated for strict Null-Safety
  flutter_math_fork: ^0.7.2
  pdf: ^3.11.1                 # Updated 
  printing: ^5.13.0            # Updated

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0        # Updated for strict Dart 3 analysis

flutter:
  uses-material-design: true
