name: pronotes_latex
description: Brutalist Hybrid LaTeX and Visual PDF Editor.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '^3.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  flutter_markdown: ^0.7.4
  markdown: ^7.3.1
  flutter_math_fork: ^0.7.2
  pdf: ^3.11.1
  printing: ^5.13.0
  flutter_colorpicker: ^1.1.0    # NEW: Advanced Color Wheel
  shared_preferences: ^2.2.3     # NEW: For saving Drawing Artifacts
  screenshot: ^3.0.0             # NEW: For perfectly rendering LaTeX to offline PDF

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
