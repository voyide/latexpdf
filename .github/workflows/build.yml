name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

# Attempts to silence the Node.js deprecation warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build & Export APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 📦 Install Dependencies
        run: flutter pub get

      - name: 🔍 Analyze Code (Safety Check)
        run: flutter analyze

      # [NEW STEP] Automatically generates the missing Android Gradle files!
      - name: 🏗️ Generate Native Android Files
        run: flutter create --platforms=android .

      - name: 🛠️ Build Release APK
        run: flutter build apk --release

      - name: 🚀 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pronotes-latex-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14
